name: order-api

on:
  push:
    branches: [main]
    paths:
      - "apps/order-api/**"
      - ".github/workflows/order-api.yml"
  pull_request:
    paths:
      - "apps/order-api/**"
      - ".github/workflows/order-api.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/order-api

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/order-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false

      - name: Test
        run: go vet ./... && go test ./... -v

      - name: Scan dependencies and source (blocking)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: apps/order-api
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: apps/order-api
          load: true
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Scan image (blocking)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag "$IMAGE_NAME:$GITHUB_SHA" "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:$GITHUB_SHA"
          docker push "$IMAGE_NAME:latest"
