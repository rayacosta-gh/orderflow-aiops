name: terraform-security

on:
  push:
    branches: [main]
  pull_request:
  # No path filter, deliberately: this is the one branch-protection-required
  # check, and a path-filtered required check never reports (and blocks
  # merges forever) on a PR that doesn't touch a matching path. Checkov is
  # cheap enough (~30s over a small directory) to just always run.

permissions:
  contents: read
  security-events: write

jobs:
  checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # continue-on-error here so the SARIF upload below still runs on
      # failed checks; the job is explicitly failed afterward instead,
      # which keeps this blocking without losing the Security-tab report.
      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@v12.3114.0
        continue-on-error: true
        with:
          directory: infra/terraform
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,results.sarif
          soft_fail: false

      - name: Upload results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

      - name: Fail if Checkov found blocking issues
        if: steps.checkov.outcome == 'failure'
        run: exit 1
