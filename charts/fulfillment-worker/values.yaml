replicaCount: 1

image:
  repository: orderflow-aiops-fulfillment-worker
  tag: latest
  pullPolicy: IfNotPresent

containerPort: 8000

service:
  port: 8000

env: []

healthPath: /healthz

probes:
  readiness:
    initialDelaySeconds: 2
    periodSeconds: 5
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 10

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi
