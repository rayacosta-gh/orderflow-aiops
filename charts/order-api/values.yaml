replicaCount: 1

image:
  repository: orderflow-aiops-order-api
  tag: latest
  pullPolicy: IfNotPresent

containerPort: 8080

service:
  port: 8080

env:
  - name: PORT
    value: "8080"

healthPath: /healthz

probes:
  readiness:
    initialDelaySeconds: 2
    periodSeconds: 5
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 10

resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 250m
    memory: 128Mi
