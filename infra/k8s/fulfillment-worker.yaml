apiVersion: apps/v1
kind: Deployment
metadata:
  name: fulfillment-worker
  namespace: orderflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fulfillment-worker
  template:
    metadata:
      labels:
        app: fulfillment-worker
    spec:
      containers:
        - name: fulfillment-worker
          image: orderflow-aiops-fulfillment-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fulfillment-worker
  namespace: orderflow
spec:
  selector:
    app: fulfillment-worker
  ports:
    - port: 8000
      targetPort: 8000
